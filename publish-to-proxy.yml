name: Public Proxy Release

on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a tag like v1.0, v2.1.3

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Code
        uses: actions/checkout@v4

      - name: Build Your Project
        run: |
          # 1. RUN YOUR ACTUAL BUILD COMMANDS HERE
          # Examples: 'npm run build' or 'go build'
          # For this example, we just create a dummy file:
          mkdir -p dist
          echo "This is your compiled app" > dist/app.exe
          zip -r release-asset.zip dist/

      - name: Push to Public Repo
        uses: softprops/action-gh-release@v2
        with:
          # Use the secret we created
          token: ${{ secrets.PROXY_REPO_TOKEN }}
          # Point to the public storefront repo
          repository: YOUR_USERNAME/YOUR_PUBLIC_PROXY_REPO
          # The file you want to share
          files: release-asset.zip
          # Match the tag version from the private repo
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Official public release for version ${{ github.ref_name }}"
          draft: false
          prerelease: false
